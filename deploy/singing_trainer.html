<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视唱旋律生成器</title>
    <script src="vexflow.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="harmony_melody.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #aaa;
            font-size: 14px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .more-settings {
            margin-bottom: 30px;
            padding: 0 20px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .more-settings > summary {
            list-style: none;
            cursor: pointer;
            padding: 14px 0;
            font-size: 15px;
            font-weight: bold;
            color: #ccc;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .more-settings > summary::-webkit-details-marker {
            display: none;
        }

        .more-settings > summary::before {
            content: '▶';
            font-size: 11px;
            color: #e94560;
            transition: transform 0.2s ease;
            display: inline-block;
        }

        .more-settings[open] > summary::before {
            transform: rotate(90deg);
        }

        .more-settings-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding-top: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-size: 14px;
            color: #ccc;
            font-weight: bold;
        }

        select {
            padding: 10px 20px;
            font-size: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:hover {
            border-color: #e94560;
            background: rgba(0, 0, 0, 0.5);
        }

        select:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* === 渲染按钮绿光圈动画（JS 驱动：按小节数自适应时长 + 90% 等待渲染完成） === */
        /* @property 注册 --ring-progress 为 <angle>，JS 在 #render-btn 上 setProperty，
           inherits: true 让 ::after 伪元素继承该值，驱动 conic-gradient 进度。
           状态机见 JS：phase1(0→90%) → waiting(90→92% 极慢爬行) → phase2(92→100% 线性收尾) */
        @property --ring-progress {
            syntax: '<angle>';
            inherits: true;
            initial-value: 0deg;
        }

        #render-btn {
            position: relative;
            isolation: isolate;  /* 创建层叠上下文，让 ::after 绿圈覆盖在按钮上层 */
            --ring-progress: 0deg;
        }

        /* 按下渲染：按钮变灰（不被 disabled 的 opacity 压暗），突出周围绿线 */
        #render-btn.rendering {
            opacity: 1 !important;
            background: #6b7280 !important;
            color: #cbd5e1 !important;
            box-shadow: none !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
        }

        /* 椭圆周围绿光圈：从 12 点（top）顺时针绕一圈回 12 点 */
        /* conic-gradient 起点 from 0deg 即 12 点方向；mask-composite 抠出环形描边 */
        #render-btn.rendering::after {
            content: '';
            position: absolute;
            inset: -4px;                 /* 比按钮大 4px，光圈在按钮外 */
            border-radius: inherit;       /* 继承椭圆形状 */
            padding: 2px;                /* 描边宽度 */
            background: conic-gradient(from 0deg,
                #4ade80 0deg,
                #4ade80 var(--ring-progress),
                rgba(74, 222, 128, 0.12) var(--ring-progress),
                rgba(74, 222, 128, 0.12) 360deg);
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            mask-composite: exclude;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(0 0 6px rgba(74, 222, 128, 0.7));
        }

        .sheet-music-container {
            background: #FBF6E3;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
            margin-bottom: 30px;
        }

        #sheet-music {
            display: flex;
            justify-content: center;
        }

        #sheet-music svg {
            display: block;
        }

        /* 手机竖屏：SVG 等比缩放适配屏幕宽度，消除上下空白；容器 padding 收小 */
        @media (max-width: 768px) {
            .sheet-music-container {
                padding: 12px;
            }
            #sheet-music svg {
                max-width: 100%;
                height: auto;
            }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 4px;
        }

        .playback-info {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .tempo-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tempo-control input[type="range"] {
            width: 150px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }

        .tempo-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #e94560;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tempo-control input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.6);
        }

        .tempo-value {
            font-size: 16px;
            font-weight: bold;
            color: #e94560;
            min-width: 45px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }

        .key-hint {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin-top: 10px;
        }

        .loading-indicator {
            text-align: center;
            color: #e94560;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>🎹 调性：</label>
                <select id="key-select">
                    <option value="C">C 大调</option>
                    <option value="G">G 大调</option>
                    <option value="D">D 大调</option>
                    <option value="A">A 大调</option>
                    <option value="E">E 大调</option>
                    <option value="B">B 大调</option>
                    <option value="F#">F# 大调</option>
                    <option value="F">F 大调</option>
                    <option value="Bb">Bb 大调</option>
                    <option value="Eb">Eb 大调</option>
                    <option value="Ab">Ab 大调</option>
                    <option value="Db">Db 大调</option>
                    <option value="Cm">C 小调</option>
                    <option value="Gm">G 小调</option>
                    <option value="Dm">D 小调</option>
                    <option value="Am">A 小调</option>
                    <option value="Em">E 小调</option>
                    <option value="Bm">B 小调</option>
                    <option value="F#m">F# 小调</option>
                    <option value="Fm">F 小调</option>
                    <option value="Bbm">Bb 小调</option>
                    <option value="Ebm">Eb 小调</option>

                    <option value="Dbm">Db 小调</option>
                </select>
            </div>

            <button class="btn btn-primary" id="generate-btn">🎲 生成旋律</button>
            <button class="btn btn-secondary" id="play-btn" disabled>▶️ 播放</button>
            <button class="btn btn-secondary" id="stop-btn" disabled>⏹️ 停止</button>
            <button class="btn btn-secondary" id="render-btn" disabled>🎧 渲染播放</button>
            <button class="btn btn-secondary" id="loop-mode-btn" title="循环模式：点击切换">🔁 不循环</button>
        </div>

        <details class="more-settings">
            <summary>⚙️ 更多设置</summary>
            <div class="more-settings-grid">
            <div class="control-group">
                <label>📏 小节数：</label>
                <select id="length-select">
                    <option value="8">8 小节</option>
                    <option value="12">12 小节</option>
                    <option value="16" selected>16 小节</option>
                    <option value="24">24 小节</option>
                </select>
            </div>

            <div class="tempo-control">
                <label>⚡ 速度：</label>
                <input type="range" id="tempo-slider" min="20" max="70" value="35">
                <span class="tempo-value" id="tempo-value">35</span>
                <span style="color: #888;">BPM</span>
            </div>

            <div class="control-group">
                <label>📊 跳进概率：</label>
                <input type="range" id="leap-probability" min="0" max="100" value="35" style="width: 150px; height: 6px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.2); border-radius: 3px; outline: none;">
                <span class="tempo-value" id="leap-prob-value">35%</span>
            </div>

            <div class="control-group">
                <label>🎵 音符密集度：</label>
                <input type="range" id="density-slider" min="0" max="100" value="40" style="width: 150px; height: 6px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.2); border-radius: 3px; outline: none;">
                <span class="tempo-value" id="density-value">40</span>
                <span style="color: #888; font-size: 12px;">←8/4分多 · 16分多→</span>
            </div>

            <div class="control-group">
                <label>🎼 和声旋律模式：</label>
                <input type="checkbox" id="harmony-mode-toggle" checked style="width: 18px; height: 18px; cursor: pointer; accent-color: #e94560;">
                <span style="color: #888; font-size: 12px;">开启后按和声进行生成</span>
            </div>

            <div class="control-group">
                <label>🎹 钢琴伴奏：</label>
                <input type="checkbox" id="accompaniment-toggle" checked style="width: 18px; height: 18px; cursor: pointer; accent-color: #e94560;">
                <span style="color: #888; font-size: 12px;">需和声模式开启</span>
            </div>

            <div class="control-group">
                <label>♯♭ 唱出升降号：</label>
                <input type="checkbox" id="sing-accidentals-toggle" checked style="width: 18px; height: 18px; cursor: pointer; accent-color: #e94560;">
                <span style="color: #888; font-size: 12px;">关闭后用第二套采样(不唱升降记号)</span>
            </div>

            <div class="control-group">
                <label>🎤 人声音量：</label>
                <input type="range" id="vocal-volume-slider" min="0" max="100" value="100" style="width: 120px; height: 6px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.2); border-radius: 3px; outline: none;">
                <span class="tempo-value" id="vocal-volume-value">100</span>
                <button id="vocal-mute-btn" class="btn btn-secondary" style="padding: 6px 12px; font-size: 14px; min-width: 44px;">🔊</button>
            </div>

            <div class="control-group">
                <label>🎹 钢琴音量：</label>
                <input type="range" id="piano-volume-slider" min="0" max="100" value="35" style="width: 120px; height: 6px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.2); border-radius: 3px; outline: none;">
                <span class="tempo-value" id="piano-volume-value" style="color: #e94560;">35</span>
                <button id="piano-mute-btn" class="btn btn-secondary" style="padding: 6px 12px; font-size: 14px; min-width: 44px;">🔊</button>
                <span style="color: #888; font-size: 12px;">需和声模式开启</span>
            </div>

            <div class="control-group">
                <label>📐 谱面：</label>
                <select id="measures-per-line-select">
                    <option value="2" selected>一行 2 小节（大）</option>
                    <option value="4">一行 4 小节（紧凑）</option>
                </select>
            </div>

            <div class="control-group">
                <label>� 音域：</label>
                <select id="range-start">
                    <option value="C3">C3</option>
                    <option value="D3">D3</option>
                    <option value="E3">E3</option>
                    <option value="F3">F3</option>
                    <option value="G3">G3</option>
                    <option value="A3">A3</option>
                    <option value="B3">B3</option>
                    <option value="C4" selected>C4</option>
                    <option value="D4">D4</option>
                    <option value="E4">E4</option>
                </select>
                <span style="color: #888;">-</span>
                <select id="range-end">
                    <option value="C4">C4</option>
                    <option value="D4">D4</option>
                    <option value="E4">E4</option>
                    <option value="F4">F4</option>
                    <option value="G4">G4</option>
                    <option value="A4">A4</option>
                    <option value="B4">B4</option>
                    <option value="C5">C5</option>
                    <option value="D5">D5</option>
                    <option value="E5" selected>E5</option>
                    <option value="F5">F5</option>
                    <option value="G5">G5</option>
                </select>
            </div>

            </div>
        </details>

        <div class="playback-info" id="playback-info">点击"生成旋律"开始</div>
        <div class="playback-info" id="render-info" style="display: none; color: #e94560; min-height: 20px;"></div>

        <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="sheet-music-container">
            <div id="sheet-music"></div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">旋律音符数</div>
                <div class="stat-value" id="note-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">音域范围</div>
                <div class="stat-value" id="range-value">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">当前调性</div>
                <div class="stat-value" id="current-key">C</div>
            </div>
        </div>

        <div class="key-hint">提示：旋律从主音开始，结束于主音，适合视唱练习</div>
    </div>

    <script>
        const scales = {
            'C': ['C', 'D', 'E', 'F', 'G', 'A', 'B'],
            'G': ['G', 'A', 'B', 'C', 'D', 'E', 'F#'],
            'D': ['D', 'E', 'F#', 'G', 'A', 'B', 'C#'],
            'A': ['A', 'B', 'C#', 'D', 'E', 'F#', 'G#'],
            'E': ['E', 'F#', 'G#', 'A', 'B', 'C#', 'D#'],
            'B': ['B', 'C#', 'D#', 'E', 'F#', 'G#', 'A#'],
            'F#': ['F#', 'G#', 'A#', 'B', 'C#', 'D#', 'E#'],
            'F': ['F', 'G', 'A', 'Bb', 'C', 'D', 'E'],
            'Bb': ['Bb', 'C', 'D', 'Eb', 'F', 'G', 'A'],
            'Eb': ['Eb', 'F', 'G', 'Ab', 'Bb', 'C', 'D'],
            'Ab': ['Ab', 'Bb', 'C', 'Db', 'Eb', 'F', 'G'],
            'Db': ['Db', 'Eb', 'F', 'Gb', 'Ab', 'Bb', 'C'],
            'Cm': ['C', 'D', 'Eb', 'F', 'G', 'Ab', 'Bb'],
            'Gm': ['G', 'A', 'Bb', 'C', 'D', 'Eb', 'F'],
            'Dm': ['D', 'E', 'F', 'G', 'A', 'Bb', 'C'],
            'Am': ['A', 'B', 'C', 'D', 'E', 'F', 'G'],
            'Em': ['E', 'F#', 'G', 'A', 'B', 'C', 'D'],
            'Bm': ['B', 'C#', 'D', 'E', 'F#', 'G', 'A'],
            'F#m': ['F#', 'G#', 'A', 'B', 'C#', 'D', 'E'],
            'Fm': ['F', 'G', 'Ab', 'Bb', 'C', 'Db', 'Eb'],
            'Bbm': ['Bb', 'C', 'Db', 'Eb', 'F', 'Gb', 'Ab'],
            'Ebm': ['Eb', 'F', 'Gb', 'Ab', 'Bb', 'Db', 'Eb'],
            'Abm': ['Ab', 'Bb', 'Db', 'Eb', 'F', 'Gb', 'Ab'],
            'Dbm': ['Db', 'Eb', 'F', 'Gb', 'Ab', 'Bb', 'C']
        };

        const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

        // 将音名转为半音索引（0-11），支持降号音名
        function noteNameIndex(name) {
            const flatMap = { 'Db': 1, 'Eb': 3, 'Gb': 6, 'Ab': 8, 'Bb': 10 };
            const idx = noteNames.indexOf(name);
            return idx !== -1 ? idx : (flatMap[name] ?? -1);
        }
        
        const vexflowNoteNames = {
            'C': 'C', 'C#': 'C#', 'Db': 'Db',
            'D': 'D', 'D#': 'D#', 'Eb': 'Eb',
            'E': 'E', 'E#': 'E#', 'Fb': 'Fb',
            'F': 'F', 'F#': 'F#', 'Gb': 'Gb',
            'G': 'G', 'G#': 'G#', 'Ab': 'Ab',
            'A': 'A', 'A#': 'A#', 'Bb': 'Bb',
            'B': 'B', 'B#': 'B#', 'Cb': 'Cb'
        };

        const solfegeNames = ['do', 're', 'mi', 'fa', 'sol', 'la', 'si'];

        // 音名 → 唱名映射（用于构造文件名，不含八度）
        const noteToSolfege = {
            'C':  'do',    'C#': '#do',  'Db': '♭re',
            'D':  're',    'D#': '#re',  'Eb': '♭mi',
            'E':  'mi',    'E#': 'fa',   'Fb': 'mi',
            'F':  'fa',    'F#': '#fa',  'Gb': '♭sol',
            'G':  'sol',   'G#': '#sol', 'Ab': '♭la',
            'A':  'la',    'A#': '#la',  'Bb': '♭si',
            'B':  'si',    'B#': 'do',   'Cb': 'si'
        };

        // 音频采样文件后缀：wav(无损体积大) / mp3(有损体积约1/10，利于预加载和移动端)
        // 切换格式时改这里即可，文件名主体格式（如 #fa_5、#fa_5re）不变
        const AUDIO_EXT = '.mp3';

        let currentKey = 'C';
        let melodyLength = 16;
        let tempo = 35;
        let leapProbability = 0.35;
        let density = 0.6;  // 音符密集度：0 (最密集，多16分) ~ 1 (最稀疏，多4分/附点/2分)
                            // 滑块方向已反转(右=密集)，故默认滑块40对应 density=0.6
        let rangeStart = 'C4';
        let rangeEnd = 'E5';
        let currentMelody = [];
        let isPlaying = false;
        let playbackTimer = null;
        let noteTimers = [];
        let currentNoteIndex = 0;
        let startTime = 0;

        // 音量控件

        const vocalMuteBtn = document.getElementById('vocal-mute-btn');

        // 若两者同时开始（offset=0），钢琴必然先被听到 → 拍点提前。

        const pianoOffsetSec = 0.05;
        // 乐谱每行小节数：默认 2（更大更清晰），可切到 4（紧凑）

        let loopMode = 'none';

        // === 人声音量滑块 ===

        // === "唱出升降号" 开关 ===

        // 取消勾选：升降音改用同音名自然音采样 + playbackRate 做±半音处理（音准正确，发音省略升降记号）
        singAccidentalsToggle.addEventListener('change', (e) => {

        measuresPerLineSelect.addEventListener('change', (e) => {

        // === 循环模式切换（三态点击：不循环 → 单曲循环 → 自动下一首 → 不循环）===
        function setLoopMode(mode) {
            loopMode = mode;

        loopModeBtn.addEventListener('click', () => {

        });

        accompanimentToggle.addEventListener('change', async (e) => {
            const enabled = e.target.checked;

            if (enabled && !harmonyModeEnabled) {

        rangeEndSelect.addEventListener('change', (e) => {

        // === 参数持久化（localStorage 自动保存/恢复） ===
        // 所有滑块/开关/选择器变化时自动保存；页面加载时读取并恢复
        // （含按钮文案、disabled 状态、内部变量等联动同步）
        const SETTINGS_KEY = 'singingTrainerSettings';
        const PERSISTENT_IDS = [
            'key-select','length-select','tempo-slider','leap-probability','density-slider',
            'harmony-mode-toggle','accompaniment-toggle','vocal-volume-slider','vocal-mute-btn',
            'sing-accidentals-toggle','piano-volume-slider','piano-mute-btn',
            'measures-per-line-select','range-start','range-end'
        ];

        function collectSettings() {
            return {
                currentKey: keySelect.value,
                melodyLength: lengthSelect.value,
                tempo: tempoSlider.value,
                leapProbability: leapProbSlider.value,
                density: densitySlider.value,
                rangeStart: rangeStartSelect.value,
                rangeEnd: rangeEndSelect.value,
                harmonyModeEnabled: harmonyModeToggle.checked,

                loopMode: loopMode

        function saveSettings() {
            try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(collectSettings())); }
            catch (e) { console.warn('保存设置失败:', e); }
